<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#f1f3f6;
        }

        .card{
            border:none;
            border-radius:12px;
        }

        .card:hover{
            transform:translateY(-5px);
            transition:0.3s;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light"
     style="background-color:#f1f3f6;">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            E-Commerce
        </a>

        <form action="/"
              method="get"
              class="d-flex w-50">

            <input class="form-control me-2"
                   type="search"
                   name="keyword"
                   placeholder="Search for Products, Brands and More">

            <button class="btn btn-primary"
                    type="submit">
                Search
            </button>

        </form>

        <div>

            <a href="/"
               class="btn btn-outline-secondary me-2">
                Home
            </a>

            <a href="/add-product"
               class="btn btn-outline-secondary me-2">
                Add Product
            </a>

            <a href="/register"
               class="btn btn-outline-secondary me-2">
                Register
            </a>

            <a href="/login"
               class="btn btn-outline-secondary">
                Login
            </a>
            <a href="/cart"
               class="btn btn-outline-secondary ms-2">
                Cart (
                <span th:text="${cartCount}"></span>
                )
            </a>
            <a href="/orders"
               class="btn btn-outline-dark ms-2">
                Orders
            </a>
        </div>

    </div>

</nav>
<div id="productCarousel"
     class="carousel slide mt-3"
     data-bs-ride="carousel">

    <div class="carousel-inner">

        <div class="carousel-item active">
            <a href="/product/1">
                <img src="/images/laptop.png"
                     class="d-block w-100"
                     style="height:500px; object-fit:contain; background:#000;">
            </a>
        </div>

        <div class="carousel-item">
            <a href="/product/2">
                <img src="/images/phone.png"
                     class="d-block w-100"
                     style="height:500px; object-fit:contain; background:#000;">
            </a>
        </div>

        <div class="carousel-item">
            <a href="/product/3">
                <img src="/images/headphone.png"
                     class="d-block w-100"
                     style="height:500px; object-fit:contain; background:#000;">
            </a>
        </div>

    </div>

    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#productCarousel"
            data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#productCarousel"
            data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

<div class="container mt-5">

    <div class="row">

        <div class="col-lg-3 col-md-4 col-sm-6 mb-4"
             th:each="product : ${products}">

            <div class="card h-100 shadow-sm">

                <img th:src="${product.imageUrl}"
                     class="card-img-top p-3"
                     alt="Product Image"
                     style="height:250px;
            object-fit:contain;
            background:white;">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${product.name}">
                    </h5>

                    <p class="card-text"
                       th:text="${product.description}">
                    </p>

                    <h6 class="text-success fw-bold">
                        ₹ <span th:text="${product.price}"></span>
                    </h6>

                    <a th:href="@{/product/{id}(id=${product.id})}"
                       class="btn btn-primary">
                        View Details
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center py-4 mt-5"
        style="background:#fff; border-top:1px solid #ddd;">

    <h6>E-Commerce Web Application</h6>

    <p class="text-muted mb-0">
        Developed using Spring Boot, Thymeleaf, MySQL and Bootstrap
    </p>

</footer>
</body>
</html>
