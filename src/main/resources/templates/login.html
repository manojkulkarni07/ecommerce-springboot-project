<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Login</title>
</head>
<body>

<h1>User Login</h1>

<form action="/login" method="post">

    <label>Email:</label>
    <input type="email" name="email">

    <br><br>

    <label>Password:</label>
    <input type="password" name="password">

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
