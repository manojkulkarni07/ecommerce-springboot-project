<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cart Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f1f3f6;
        }

        .checkout-card{
            max-width:700px;
            margin:auto;
            border:none;
            border-radius:15px;
        }

        .checkout-header{
            background:linear-gradient(135deg,#0d6efd,#0dcaf0);
            color:white;
            border-radius:15px 15px 0 0;
            padding:20px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">

    <div class="card shadow checkout-card">

        <div class="checkout-header">
            <h2>Checkout</h2>
            <p class="mb-0">Complete your order details</p>
        </div>

        <div class="card-body p-4">

            <form action="/place-order"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           name="customerName"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Address
                    </label>

                    <textarea name="address"
                              class="form-control"
                              rows="3"
                              required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Phone Number
                    </label>

                    <input type="text"
                           name="phoneNumber"
                           class="form-control"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Payment Method
                    </label>

                    <select name="paymentMethod"
                            class="form-select">

                        <option value="UPI">
                            UPI
                        </option>

                        <option value="Credit Card">
                            Credit Card
                        </option>

                        <option value="Debit Card">
                            Debit Card
                        </option>

                        <option value="Cash On Delivery">
                            Cash On Delivery
                        </option>

                    </select>
                </div>

                <button type="submit"
                        class="btn btn-success w-100">
                    Place Order
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
