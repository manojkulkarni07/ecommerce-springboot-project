<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-card{
            width:450px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            animation:slideUp 0.8s ease;
        }

        .register-card:hover{
            transform:translateY(-5px);
            transition:0.3s;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .btn-register{
            transition:0.3s;
        }

        .btn-register:hover{
            transform:scale(1.05);
        }

        @keyframes slideUp{
            from{
                opacity:0;
                transform:translateY(50px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="card shadow-lg register-card">

    <div class="card-header">
        <h2>Create Account</h2>
        <p class="mb-0">Join E-Commerce Today</p>
    </div>

    <div class="card-body p-4">

        <form action="/register"
              method="post">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100 btn-register">
                Register
            </button>

        </form>

        <hr>

        <div class="text-center">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>

</div>

</body>
</html>
